<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-LAPORAN AKTIVITI BAHASA JEPUN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-32">

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8 space-y-6">
        <!-- Notifikasi -->
        <div id="status-loading" class="hidden fixed inset-0 z-[100] bg-slate-950/80 backdrop-blur-md flex items-center justify-center">
            <div class="bg-slate-900 p-10 rounded-[3rem] border border-white/10 shadow-2xl text-center">
                <div class="animate-spin h-12 w-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <h2 class="text-xl font-black uppercase">Menjana PDF 2 Muka Surat...</h2>
                <p class="text-slate-500 text-sm mt-2">Menggunakan jsPDF AutoTable & Grid 3x3</p>
            </div>
        </div>

        <div id="status-success" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[100] bg-emerald-600 px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 animate-bounce">
            <span class="font-black uppercase tracking-widest text-sm text-white">Berjaya Dihantar ke Drive!</span>
        </div>

        <!-- Header -->
        <header class="flex flex-col md:flex-row gap-6 items-center bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 shadow-xl">
            <div class="w-20 h-20 bg-white rounded-2xl p-2">
                <img src="https://i.postimg.cc/0jL0tPVw/image.png" class="w-full h-full object-contain" alt="Logo">
            </div>
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-black text-white uppercase tracking-tighter italic">E-LAPORAN BAHASA JEPUN</h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">SMK Ayer Keroh, Melaka</p>
            </div>
        </header>

        <!-- Form Utama -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2 bg-slate-900/40 p-4 rounded-2xl border border-white/5">
                <label class="text-[9px] font-black text-blue-500 uppercase mb-2 block tracking-widest">Nama Penyedia</label>
                <input type="text" id="namaPenyedia" placeholder="MUHAMMAD AKMAL SAFWAN BIN AHAMAD" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-3 outline-none focus:border-blue-500 font-bold uppercase">
            </div>
            <div class="bg-slate-900/40 p-4 rounded-2xl border border-white/5">
                <label class="text-[9px] font-black text-blue-500 uppercase mb-2 block tracking-widest">Tarikh</label>
                <input type="date" id="tarikh" onchange="updateDay()" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-3 outline-none focus:border-blue-500">
            </div>
            <div class="bg-slate-900/40 p-4 rounded-2xl border border-white/5">
                <label class="text-[9px] font-black text-blue-500 uppercase mb-2 block tracking-widest">Hari</label>
                <input type="text" id="hari" readonly placeholder="ISNIN" class="w-full bg-slate-800 text-slate-400 rounded-xl p-3 text-center font-black">
            </div>
            <div class="bg-slate-900/40 p-4 rounded-2xl border border-white/5">
                <label class="text-[9px] font-black text-blue-500 uppercase mb-2 block tracking-widest">Masa</label>
                <input type="text" id="masa" placeholder="12:10 PM - 1:10 PM" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-3 outline-none focus:border-blue-500 uppercase">
            </div>
            <div class="bg-slate-900/40 p-4 rounded-2xl border border-white/5">
                <label class="text-[9px] font-black text-blue-500 uppercase mb-2 block tracking-widest">Kelas</label>
                <select id="kelas" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-3 outline-none focus:border-blue-500 font-bold">
                    <option value="1 ALPHA">1 ALPHA</option>
                    <option value="2 ALPHA">2 ALPHA</option>
                    <option value="3 ALPHA">3 ALPHA</option>
                    <option value="4 ALPHA">4 ALPHA</option>
                    <option value="5 ALPHA">5 ALPHA</option>
                </select>
            </div>
        </div>

        <section class="bg-slate-900/40 p-8 rounded-[2.5rem] border border-white/5 space-y-6">
            <div>
                <label class="text-[10px] font-black text-blue-500 uppercase mb-2 block tracking-widest">Tajuk Aktiviti</label>
                <input type="text" id="tajukAktiviti" placeholder="Contoh: 福笑い (Fukuwarai)" class="w-full bg-transparent border-b-2 border-white/5 py-3 text-2xl font-black focus:border-blue-500 outline-none uppercase">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[9px] font-black text-indigo-400 uppercase mb-2 block tracking-widest">Objektif Aktiviti</label>
                    <textarea id="objektif" rows="6" class="w-full bg-slate-950/50 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-indigo-500" placeholder="1. Murid dapat..."></textarea>
                </div>
                <div>
                    <label class="text-[9px] font-black text-indigo-400 uppercase mb-2 block tracking-widest">Ringkasan Aktiviti</label>
                    <textarea id="ringkasan" rows="6" class="w-full bg-slate-950/50 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-indigo-500" placeholder="1. Guru menerangkan..."></textarea>
                </div>
            </div>
        </section>

        <!-- Grid Gambar 3x3 -->
        <section class="bg-slate-900/40 p-8 rounded-[2.5rem] border border-white/5">
            <h2 class="text-[10px] font-black text-blue-500 uppercase mb-6 block tracking-widest text-center">Dokumentasi Gambar (Grid 3x3 - Maks 9)</h2>
            <div id="image-grid" class="grid grid-cols-3 gap-3">
                <!-- Slot 1-9 dijanakan oleh JS -->
            </div>
        </section>

        <!-- Refleksi -->
        <section class="bg-slate-900/40 p-8 rounded-[2.5rem] border border-white/5">
            <label class="text-[10px] font-black text-blue-500 uppercase mb-4 block tracking-widest">Refleksi & Impak</label>
            <textarea id="refleksi" rows="4" class="w-full bg-slate-950/50 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-blue-500" placeholder="Aktiviti berjalan lancar..."></textarea>
        </section>

        <!-- Action Bar -->
        <div class="fixed bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-xl border-t border-white/5 p-6 z-50">
            <div class="max-w-4xl mx-auto flex gap-4">
                <button onclick="handleUpload()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-5 rounded-3xl font-black uppercase text-xs tracking-[0.2em] shadow-2xl shadow-blue-600/20 transition-all">
                    Hantar ke Google Drive
                </button>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzb8-5rmh0a5YD7ZlTY3c4D5SeBh3jCk2Q9W6NZPw7WxKJcYdlDW2epSC9y_4N1jJw/exec";
        const SHEET_ID = "1cGwGweJ_1IlvZlviMY5FMyaXGpqaQfndrrV2m2ID3NQ";
        
        // Initial state untuk 9 gambar
        let images = Array(9).fill(null);

        function updateDay() {
            const dateInput = document.getElementById('tarikh').value;
            if (dateInput) {
                const days = ['AHAD', 'ISNIN', 'SELASA', 'RABU', 'KHAMIS', 'JUMAAT', 'SABTU'];
                const day = days[new Date(dateInput).getDay()];
                document.getElementById('hari').value = day;
            }
        }

        function initImageGrid() {
            const grid = document.getElementById('image-grid');
            grid.innerHTML = '';
            images.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = "aspect-square bg-slate-950 rounded-2xl border-2 border-dashed border-white/5 relative overflow-hidden flex items-center justify-center cursor-pointer hover:border-blue-500/50 transition-colors";
                if (img) {
                    div.innerHTML = `<img src="${img}" class="w-full h-full object-cover">
                                     <button onclick="removeImg(event, ${idx})" class="absolute top-1 right-1 bg-red-600/80 backdrop-blur-sm text-white p-1 rounded-lg text-[10px]">✕</button>`;
                } else {
                    div.innerHTML = `<label class="w-full h-full flex flex-col items-center justify-center cursor-pointer">
                                        <span class="text-xl text-slate-700 font-bold">+</span>
                                        <span class="text-[8px] text-slate-600 uppercase font-bold mt-1">G${idx+1}</span>
                                        <input type="file" class="hidden" accept="image/*" onchange="uploadImg(event, ${idx})">
                                     </label>`;
                }
                grid.appendChild(div);
            });
        }

        function uploadImg(e, idx) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                images[idx] = ev.target.result;
                initImageGrid();
            };
            reader.readAsDataURL(file);
        }

        function removeImg(e, idx) {
            e.stopPropagation();
            images[idx] = null;
            initImageGrid();
        }

        // Fungsi Penjanaan PDF guna jsPDF (Halaman 1 & 2 SAHAJA)
        async function generatePDF(data) {
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 20;
            let currentY = 15;

            // --- PAGE 1 ---
            // Logo & Header
            try {
                const logoImg = "https://i.postimg.cc/0jL0tPVw/image.png";
                doc.addImage(logoImg, 'PNG', margin, currentY, 15, 15);
            } catch (e) {}
            
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(0, 32, 96); // Biru Gelap
            doc.text("E-LAPORAN AKTIVITI BAHASA JEPUN", margin + 20, currentY + 6);
            doc.setFontSize(8);
            doc.setTextColor(120);
            doc.text("SMK AYER KEROH, MELAKA", margin + 20, currentY + 11);
            
            currentY += 20;
            doc.setDrawColor(0, 32, 96);
            doc.setLineWidth(1);
            doc.line(margin, currentY, pageWidth - margin, currentY);
            
            currentY += 10;

            // Profil Table
            doc.autoTable({
                startY: currentY,
                margin: { left: margin, right: margin },
                theme: 'plain',
                styles: { fontSize: 8, cellPadding: 2 },
                columnStyles: { 0: { fontStyle: 'bold', textColor: 100 }, 1: { fontStyle: 'bold', textColor: 0 } },
                body: [
                    ['PENYEDIA', data.nama.toUpperCase()],
                    ['MASA & KELAS', `${data.masa.toUpperCase()} | ${data.kelas}`],
                    ['TARIKH / HARI', `${data.tarikh} (${data.hari})`]
                ]
            });

            currentY = doc.lastAutoTable.finalY + 10;

            // Tajuk
            doc.setFontSize(9);
            doc.setTextColor(0, 32, 96);
            doc.text("TAJUK AKTIVITI:", margin, currentY);
            currentY += 6;
            doc.setFontSize(14);
            doc.setTextColor(0);
            doc.text(data.tajuk.toUpperCase(), margin, currentY);
            currentY += 10;

            // Objektif & Ringkasan (Guna AutoTable untuk kawalan baris)
            doc.autoTable({
                startY: currentY,
                margin: { left: margin, right: margin },
                head: [['OBJEKTIF AKTIVITI', 'RINGKASAN AKTIVITI']],
                body: [[data.objektif, data.ringkasan]],
                theme: 'grid',
                headStyles: { fillColor: [0, 32, 96], textColor: 255, fontSize: 8, fontStyle: 'bold' },
                styles: { fontSize: 8, overflow: 'linebreak', cellPadding: 5 },
                columnStyles: { 0: { width: 85 }, 1: { width: 85 } }
            });

            // --- PAGE 2 ---
            doc.addPage();
            currentY = 15;
            
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(150);
            doc.text("DOKUMENTASI BERGAMBAR & REFLEKSI", margin, currentY);
            currentY += 8;
            doc.line(margin, currentY, pageWidth - margin, currentY);
            currentY += 10;

            // Grid Gambar 3x3
            const validImages = images.filter(img => img !== null);
            const imgSize = 53; // Saiz kotak gambar mm
            const gap = 5;
            let imgX = margin;
            let imgY = currentY;

            for (let i = 0; i < validImages.length; i++) {
                try {
                    doc.addImage(validImages[i], 'JPEG', imgX, imgY, imgSize, imgSize * 0.75); // Aspect ratio video
                    doc.setDrawColor(230);
                    doc.rect(imgX, imgY, imgSize, imgSize * 0.75);
                } catch (e) {}

                imgX += imgSize + gap;
                if ((i + 1) % 3 === 0) {
                    imgX = margin;
                    imgY += (imgSize * 0.75) + gap;
                }
            }

            // Refleksi di bawah Gambar
            currentY = imgY + (validImages.length > 0 ? 10 : 0);
            if (validImages.length % 3 !== 0) {
                // Adjust if last row was incomplete
                currentY = imgY + (imgSize * 0.75) + 10;
            }

            doc.autoTable({
                startY: currentY,
                margin: { left: margin, right: margin },
                head: [['REFLEKSI & IMPAK']],
                body: [[data.refleksi || 'Tiada refleksi disediakan.']],
                theme: 'striped',
                headStyles: { fillColor: [60, 60, 60], fontSize: 8 },
                styles: { fontSize: 9, fontStyle: 'italic', cellPadding: 6 }
            });

            // Tandatangan - POSISI TETAP (Absolute bottom)
            const footerY = 265;
            doc.setDrawColor(0);
            doc.setLineWidth(0.2);
            
            doc.line(margin, footerY, margin + 50, footerY);
            doc.line(pageWidth - margin - 50, footerY, pageWidth - margin, footerY);
            
            doc.setFontSize(7);
            doc.setFont("helvetica", "bold");
            doc.text("TANDATANGAN PENYEDIA", margin, footerY + 4);
            doc.text("DISAHKAN OLEH", pageWidth - margin - 50, footerY + 4);

            return doc.output('blob');
        }

        async function handleUpload() {
            const data = {
                nama: document.getElementById('namaPenyedia').value,
                tarikh: document.getElementById('tarikh').value,
                hari: document.getElementById('hari').value,
                masa: document.getElementById('masa').value,
                kelas: document.getElementById('kelas').value,
                tajuk: document.getElementById('tajukAktiviti').value,
                objektif: document.getElementById('objektif').value,
                ringkasan: document.getElementById('ringkasan').value,
                refleksi: document.getElementById('refleksi').value
            };

            if (!data.nama || !data.tarikh || !data.tajuk) {
                alert("Sila isi Nama, Tarikh dan Tajuk!");
                return;
            }

            document.getElementById('status-loading').classList.remove('hidden');

            try {
                const pdfBlob = await generatePDF(data);
                
                const reader = new FileReader();
                reader.readAsDataURL(pdfBlob);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const payload = {
                        sheetId: SHEET_ID,
                        pdfBase64: base64,
                        filename: `Laporan_2Muka_${data.tarikh}_${data.nama.replace(/\s+/g, '_')}.pdf`,
                        data: data
                    };

                    // Hantar ke Google Script
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });

                    document.getElementById('status-loading').classList.add('hidden');
                    document.getElementById('status-success').classList.remove('hidden');
                    setTimeout(() => document.getElementById('status-success').classList.add('hidden'), 5000);
                };
            } catch (e) {
                document.getElementById('status-loading').classList.add('hidden');
                alert("Ralat Penjanaan PDF: " + e.message);
            }
        }

        initImageGrid();
    </script>
</body>
</html>
