<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPORAN AKTIVITI BAHASA JEPUN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-32">

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8 space-y-6">
        <!-- Notifikasi Loading -->
        <div id="status-loading" class="hidden fixed inset-0 z-[100] bg-slate-950/80 backdrop-blur-md flex items-center justify-center">
            <div class="bg-slate-900 p-10 rounded-[3rem] border border-white/10 shadow-2xl text-center">
                <div class="animate-spin h-12 w-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <h2 class="text-xl font-black uppercase text-white">Menjana PDF...</h2>
                <p class="text-slate-500 text-sm mt-2">Memuatkan fon Jepun & menyusun laporan.</p>
            </div>
        </div>

        <div id="status-success" class="hidden fixed top-8 left-1/2 -translate-x-1/2 z-[100] bg-emerald-600 px-8 py-4 rounded-full shadow-2xl flex items-center gap-3 animate-bounce">
            <span class="font-black uppercase tracking-widest text-sm text-white">Laporan Berjaya Dijana!</span>
        </div>

        <!-- Header Input -->
        <header class="flex flex-col md:flex-row gap-6 items-center bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 shadow-xl">
            <div class="w-20 h-20 bg-white rounded-2xl p-2">
                <img src="https://i.postimg.cc/0jL0tPVw/image.png" class="w-full h-full object-contain" alt="Logo">
            </div>
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-black text-white uppercase tracking-tighter italic">LAPORAN AKTIVITI BAHASA JEPUN</h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">SMK Ayer Keroh, Melaka</p>
            </div>
        </header>

        <!-- Form Input -->
        <div class="grid grid-cols-1 gap-4">
            <div class="bg-slate-900/40 p-6 rounded-2xl border border-white/5 space-y-4">
                <div>
                    <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Nama Penyedia</label>
                    <input type="text" id="namaPenyedia" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500 font-bold uppercase text-white">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Masa</label>
                        <input type="text" id="masa" placeholder="Cth: 12:10 PM - 1:10 PM" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500 text-white">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Kelas</label>
                        <input type="text" id="kelas" placeholder="Cth: 2 ALPHA" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500 text-white font-bold uppercase">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Tarikh</label>
                        <input type="date" id="tarikh" onchange="updateDay()" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500 text-white">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Hari</label>
                        <input type="text" id="hari" readonly class="w-full bg-slate-800 text-slate-400 rounded-xl p-4 font-black uppercase">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Tajuk Aktiviti</label>
                    <input type="text" id="tajukAktiviti" placeholder="Cth: 福笑い (Fukuwarai)" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 outline-none focus:border-blue-500 text-xl font-black text-white">
                </div>
            </div>

            <!-- Kandungan Utama -->
            <div class="bg-slate-900/40 p-6 rounded-2xl border border-white/5 space-y-6">
                <div>
                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 block">Objektif Aktiviti</label>
                    <textarea id="objektif" rows="5" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-indigo-500 text-white" placeholder="Masukkan objektif..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 block">Ringkasan Aktiviti</label>
                    <textarea id="ringkasan" rows="5" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-indigo-500 text-white" placeholder="Masukkan ringkasan..."></textarea>
                </div>
            </div>

            <!-- Grid Gambar -->
            <div class="bg-slate-900/40 p-6 rounded-2xl border border-white/5">
                <h2 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest">Dokumentasi Gambar (Grid 3x3)</h2>
                <div id="image-grid" class="grid grid-cols-3 gap-3"></div>
            </div>

            <!-- Refleksi -->
            <div class="bg-slate-900/40 p-6 rounded-2xl border border-white/5">
                <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2 block">Refleksi & Impak</label>
                <textarea id="refleksi" rows="4" class="w-full bg-slate-950/50 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-blue-500 text-white"></textarea>
            </div>
        </div>

        <!-- Butang Jana -->
        <div class="fixed bottom-0 left-0 right-0 bg-slate-950/90 p-6 border-t border-white/5 flex justify-center z-50">
            <button onclick="handleUpload()" class="w-full max-w-lg bg-blue-600 hover:bg-blue-500 py-5 rounded-3xl font-black uppercase text-xs tracking-[0.2em] shadow-2xl transition-all">
                HANTAR & JANA PDF
            </button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzb8-5rmh0a5YD7ZlTY3c4D5SeBh3jCk2Q9W6NZPw7WxKJcYdlDW2epSC9y_4N1jJw/exec";
        const SHEET_ID = "1cGwGweJ_1IlvZlviMY5FMyaXGpqaQfndrrV2m2ID3NQ";
        
        let images = Array(9).fill(null);

        function updateDay() {
            const dateInput = document.getElementById('tarikh').value;
            if (dateInput) {
                const days = ['AHAD', 'ISNIN', 'SELASA', 'RABU', 'KHAMIS', 'JUMAAT', 'SABTU'];
                document.getElementById('hari').value = days[new Date(dateInput).getDay()];
            }
        }

        function initImageGrid() {
            const grid = document.getElementById('image-grid');
            grid.innerHTML = '';
            images.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = "aspect-square bg-slate-950 rounded-xl border-2 border-dashed border-white/5 relative overflow-hidden flex items-center justify-center cursor-pointer";
                if (img) {
                    div.innerHTML = `<img src="${img}" class="w-full h-full object-cover"><button onclick="removeImg(event, ${idx})" class="absolute top-1 right-1 bg-red-600 text-white p-1 rounded text-[8px]">✕</button>`;
                } else {
                    div.innerHTML = `<label class="w-full h-full flex items-center justify-center cursor-pointer"><span class="text-slate-700 font-bold">+</span><input type="file" class="hidden" accept="image/*" onchange="uploadImg(event, ${idx})"></label>`;
                }
                grid.appendChild(div);
            });
        }

        function uploadImg(e, idx) {
            const reader = new FileReader();
            reader.onload = (ev) => { images[idx] = ev.target.result; initImageGrid(); };
            reader.readAsDataURL(e.target.files[0]);
        }

        function removeImg(e, idx) { e.stopPropagation(); images[idx] = null; initImageGrid(); }

        async function generatePDF(data) {
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 20;
            let currentY = 20;

            // Header Logo
            try {
                const logoImg = "https://i.postimg.cc/0jL0tPVw/image.png";
                doc.addImage(logoImg, 'PNG', margin, currentY - 5, 15, 15);
            } catch (e) {}

            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(0, 32, 96);
            doc.text("LAPORAN AKTIVITI BAHASA JEPUN", margin + 20, currentY + 2);
            doc.setFontSize(9);
            doc.setTextColor(120);
            doc.text("SMK AYER KEROH, MELAKA", margin + 20, currentY + 7);
            
            currentY += 20;
            doc.setDrawColor(0, 32, 96);
            doc.setLineWidth(0.8);
            doc.line(margin, currentY, pageWidth - margin, currentY);
            currentY += 12;

            function drawField(label, value) {
                doc.setFontSize(8);
                doc.setTextColor(100, 100, 100);
                doc.setFont("helvetica", "normal");
                doc.text(label.toUpperCase(), margin, currentY);
                currentY += 5;
                doc.setFontSize(11);
                doc.setTextColor(0);
                doc.setFont("helvetica", "bold");
                doc.text(String(value).toUpperCase(), margin, currentY);
                currentY += 10;
            }

            drawField("Penyedia", data.nama);
            drawField("Masa", data.masa);
            drawField("Kelas", data.kelas);
            drawField("Tarikh", data.tarikh);
            drawField("Hari", data.hari);

            doc.setFontSize(9);
            doc.setTextColor(100);
            doc.text("TAJUK AKTIVITI:", margin, currentY);
            currentY += 6;
            doc.setFontSize(18);
            doc.setTextColor(0);
            doc.text(data.tajuk, margin, currentY);
            currentY += 15;

            doc.autoTable({
                startY: currentY,
                margin: { left: margin, right: margin },
                theme: 'grid',
                head: [['OBJEKTIF AKTIVITI']],
                body: [[data.objektif]],
                headStyles: { fillColor: [0, 32, 96], fontSize: 10, fontStyle: 'bold' },
                styles: { fontSize: 11, cellPadding: 5, font: 'helvetica' },
            });

            currentY = doc.lastAutoTable.finalY + 10;

            doc.autoTable({
                startY: currentY,
                margin: { left: margin, right: margin },
                theme: 'grid',
                head: [['RINGKASAN AKTIVITI']],
                body: [[data.ringkasan]],
                headStyles: { fillColor: [0, 32, 96], fontSize: 10, fontStyle: 'bold' },
                styles: { fontSize: 11, cellPadding: 5, font: 'helvetica' },
            });

            doc.addPage();
            currentY = 20;

            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(0, 32, 96);
            doc.text("DOKUMENTASI BERGAMBAR (GRID 3X3)", margin, currentY);
            currentY += 10;

            const validImages = images.filter(i => i);
            const imgW = 53;
            const imgH = 40;
            const gap = 5;
            let imgX = margin;
            let imgY = currentY;

            validImages.forEach((img, i) => {
                doc.addImage(img, 'JPEG', imgX, imgY, imgW, imgH);
                imgX += imgW + gap;
                if ((i + 1) % 3 === 0) {
                    imgX = margin;
                    imgY += imgH + gap;
                }
            });

            currentY = imgY + (validImages.length > 0 ? (validImages.length <= 3 ? imgH : (validImages.length <= 6 ? imgH : imgH)) + 15 : 15);
            if (validImages.length > 6) currentY = imgY + imgH + 15;
            else if (validImages.length > 3) currentY = imgY + imgH + 15;
            else if (validImages.length > 0) currentY = imgY + imgH + 15;

            doc.autoTable({
                startY: currentY,
                margin: { left: margin, right: margin },
                head: [['REFLEKSI & IMPAK']],
                body: [[data.refleksi || 'Tiada refleksi disediakan.']],
                theme: 'striped',
                headStyles: { fillColor: [80, 80, 80] },
                styles: { fontSize: 11, fontStyle: 'italic' }
            });

            const footerY = 265;
            doc.setDrawColor(0);
            doc.line(margin, footerY, margin + 50, footerY);
            doc.line(pageWidth - margin - 50, footerY, pageWidth - margin, footerY);
            doc.setFontSize(8);
            doc.text("TANDATANGAN PENYEDIA", margin, footerY + 5);
            doc.text("DISAHKAN OLEH", pageWidth - margin - 50, footerY + 5);

            return doc.output('blob');
        }

        async function handleUpload() {
            const data = {
                nama: document.getElementById('namaPenyedia').value,
                tarikh: document.getElementById('tarikh').value,
                hari: document.getElementById('hari').value,
                masa: document.getElementById('masa').value,
                kelas: document.getElementById('kelas').value,
                tajuk: document.getElementById('tajukAktiviti').value,
                objektif: document.getElementById('objektif').value,
                ringkasan: document.getElementById('ringkasan').value,
                refleksi: document.getElementById('refleksi').value
            };

            if (!data.nama || !data.tarikh) return alert("Sila lengkapkan Nama dan Tarikh!");

            document.getElementById('status-loading').classList.remove('hidden');

            try {
                const pdfBlob = await generatePDF(data);
                const reader = new FileReader();
                reader.readAsDataURL(pdfBlob);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const payload = {
                        sheetId: SHEET_ID,
                        pdfBase64: base64,
                        filename: `Laporan_Aktiviti_${data.tarikh}_${data.nama.replace(/\s+/g, '_')}.pdf`,
                        data: data
                    };

                    await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    
                    document.getElementById('status-loading').classList.add('hidden');
                    document.getElementById('status-success').classList.remove('hidden');
                    setTimeout(() => document.getElementById('status-success').classList.add('hidden'), 5000);
                };
            } catch (e) {
                alert("Ralat: " + e.message);
                document.getElementById('status-loading').classList.add('hidden');
            }
        }

        initImageGrid();
    </script>
</body>
</html>
